name: Deploy to production

on:
  push:
    branches: ['main']

jobs:
  fingerprint:
    name: Fingerprint
    environment: production
    outputs:
      android_fingerprint_hash: ${{ steps.fingerprint_android.outputs.hash }}
      ios_fingerprint_hash: ${{ steps.fingerprint_ios.outputs.hash }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - id: fingerprint_android
        name: Calculate Android fingerprint
        run: |
          HASH=$(npx @expo/fingerprint fingerprint:generate --platform android | jq -r '.hash')
          echo "Android fingerprint: $HASH"
          set-output hash "$HASH"
      - id: fingerprint_ios
        name: Calculate iOS fingerprint
        run: |
          HASH=$(npx @expo/fingerprint fingerprint:generate --platform ios | jq -r '.hash')
          echo "iOS fingerprint: $HASH"
          set-output hash "$HASH"

  get_android_build:
    name: Get Android build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: production

  get_ios_build:
    name: Get iOS build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production

  set_version:
    name: Set version code to timestamp
    needs: [get_android_build, get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id || !needs.get_android_build.outputs.build_id }}
    environment: production
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Set version code as unix timestamp
        run: |
          VERSION_CODE=$(date +%s)
          echo "Setting version code to $VERSION_CODE"

          PROJECT_ID="737e4e9e-0a70-4685-b6cd-4ac3e91b0286"
          APP_ID="com.helium.wallet.app"
          STORE_VERSION=$(node -p "require('./package.json').version")

          for PLATFORM in IOS ANDROID; do
            RESPONSE=$(curl -sf -X POST https://api.expo.dev/graphql \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -d "{\"query\":\"mutation(\$input:AppVersionInput!){appVersion{createAppVersion(appVersionInput:\$input){id}}}\",\"variables\":{\"input\":{\"appId\":\"$PROJECT_ID\",\"platform\":\"$PLATFORM\",\"applicationIdentifier\":\"$APP_ID\",\"storeVersion\":\"$STORE_VERSION\",\"buildVersion\":\"$VERSION_CODE\"}}}")
            echo "Set $PLATFORM version to $VERSION_CODE: $RESPONSE"
          done

  build_android:
    name: Build Android
    needs: [get_android_build, set_version]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS
    needs: [get_ios_build, set_version]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit iOS
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
